name: publish_pypi

on:
  push:
    tags:
      - "v*"

jobs:
  build_sdist:
    name: Build platform-independent source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies (Needed for sdist generation checks)
        run: |
          sudo apt update
          sudo apt install -y libfftw3-dev libgsl-dev libgslcblas0 libomp-dev

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v6
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # macos-14 (Sonoma, arm64) pinned: macos-latest is now macOS 26,
        # whose Homebrew dylibs require deployment target 26.0 and break
        # delocate under MACOSX_DEPLOYMENT_TARGET=14.0.
        os: [ubuntu-latest, macos-14]

    steps:
      - uses: actions/checkout@v5

      - name: Set up QEMU (Required for Linux ARM64 compilation)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Setup Zig (macOS)
        if: runner.os == 'macOS'
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install fftw gsl libomp

          # Symlink the OpenMP header into the default Homebrew include directory
          sudo ln -s /opt/homebrew/opt/libomp/include/omp.h /opt/homebrew/include/omp.h

          # Symlink the OpenMP libraries into the default Homebrew lib directory
          sudo ln -s /opt/homebrew/opt/libomp/lib/libomp.dylib /opt/homebrew/lib/libomp.dylib
          sudo ln -s /opt/homebrew/opt/libomp/lib/libomp.dylib /opt/homebrew/lib/libgomp.dylib

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          # Tell cibuildwheel/delocate that this wheel requires macOS 14.0+
          MACOSX_DEPLOYMENT_TARGET: "14.0"

          # Build natively on macOS to prevent `zig build` from compiling the wrong architecture
          CIBW_ARCHS_MACOS: "native"

          # Build both Intel (auto64) and ARM (aarch64) wheels on Linux
          # (This is safe because QEMU natively emulates aarch64 inside the Docker container)
          CIBW_ARCHS_LINUX: "auto64 aarch64"

          # Linux Docker environment compilation adjustments
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y epel-release &&
            yum install -y fftw-devel gsl-devel &&
            ARCH=$(uname -m) &&
            if [ "$ARCH" = "x86_64" ]; then ZIG_ARCH="x86_64"; else ZIG_ARCH="aarch64"; fi &&
            curl -fL -o zig.tar.xz "https://ziglang.org/download/0.16.0/zig-${ZIG_ARCH}-linux-0.16.0.tar.xz" &&
            tar -xf zig.tar.xz &&
            mv zig-*/ /usr/local/zig &&
            ln -s /usr/local/zig/zig /usr/local/bin/zig

          CIBW_SKIP: "*musllinux*"

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v6
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  publish_pypi:
    name: Publish to PyPI
    needs: [build_sdist, build_wheels]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download all workflow artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish distribution to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
