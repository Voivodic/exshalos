name: publish_testpypi

on:
  workflow_dispatch:

jobs:
  build_sdist:
    name: Build platform-independent source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies (Needed for sdist generation checks)
        run: |
          sudo apt update
          sudo apt install -y libfftw3-dev libgsl-dev libgslcblas0 libomp-dev
      
      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build sdist
        run: |
          pip install build
          python -m build --sdist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (Required for Linux ARM64 compilation)
        if: runner.os == 'Linux'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: all

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install fftw gsl libomp zig

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.22.0
        env:
          # Build both Intel (x86_64) and Apple Silicon (arm64) universal wheels on Mac
          CIBW_ARCHS_MACOS: "universal2"
          
          # Build both Intel (auto64) and ARM (aarch64) wheels on Linux
          CIBW_ARCHS_LINUX: "auto64 aarch64"

          # Linux Docker environment compilation adjustments
          CIBW_BEFORE_ALL_LINUX: >
            yum install -y epel-release &&
            yum install -y fftw-devel gsl-devel &&
            ARCH=$(uname -m) &&
            if [ "$ARCH" = "x86_64" ]; then ZIG_ARCH="x86_64"; else ZIG_ARCH="aarch64"; fi &&
            curl -fL -O "https://ziglang.org/download/0.16.0/zig-${ZIG_ARCH}-linux-0.16.0.tar.xz" &&
            tar -xf zig-linux-*.tar.xz &&
            mv zig-linux-*/zig /usr/local/bin/

          CIBW_SKIP: "cp36-* cp37-* cp38-* pp* *musllinux*"

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  publish_testpypi:
    name: Publish to TestPyPI
    needs: [build_sdist, build_wheels]
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download all workflow artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish distribution to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
